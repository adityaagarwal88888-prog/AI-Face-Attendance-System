<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Verify OTP</title>

</head>

<body class="bg-black text-white">

    <div class="min-h-screen flex items-center justify-center px-6">

        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-3xl p-10">

            <!-- TITLE -->

            <div class="text-center mb-10">

                <div class="text-6xl mb-5">
                    📩
                </div>

                <h1 class="text-4xl font-black mb-3">
                    Verify OTP
                </h1>

                <p class="text-zinc-400">
                    Enter the OTP sent to your email
                </p>

            </div>

            <!-- ERROR -->

            {% if error %}

            <div class="bg-red-500/20 border border-red-500/30 text-red-400 p-4 rounded-2xl mb-6 text-center">

                {{ error }}

            </div>

            {% endif %}

            <!-- FORM -->

            <form
                method="POST"
                class="space-y-6"
            >

                <input
                    type="text"
                    name="otp"
                    placeholder="Enter OTP"
                    required
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 outline-none"
                >

                <button
                    class="w-full bg-white text-black py-4 rounded-2xl font-bold hover:scale-105 transition duration-300"
                >
                    Verify OTP
                </button>

            </form>

        </div>

    </div>

</body>

</html>
